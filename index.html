<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDILSA – Redes Sociales</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#0b1220;
color:white;
overflow-x:hidden;
}

/* ===== FONDO SUAVE ===== */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 25% 30%,rgba(30,136,255,.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(30,136,255,.12),transparent 45%);
z-index:-1;
}

/* ===== CONTENIDO ===== */

.container{
padding:90px 20px 60px;
text-align:center;
}

.container h1{
font-size:2.2rem;
font-weight:800;
color:#1e88ff;
margin-bottom:12px;
}

.container p{
color:#cfd8e3;
max-width:460px;
margin:auto;
line-height:1.6;
margin-bottom:50px;
}

/* ===== BOTONES ===== */

.social-box{
display:flex;
flex-direction:column;
gap:18px;
max-width:380px;
margin:auto;
}

.btn-social{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:18px;
border-radius:16px;
text-decoration:none;
font-weight:700;
font-size:.95rem;
color:white;
background:#131c31;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 10px 28px rgba(0,0,0,.45);
transition:all .25s ease;
}

.btn-social:hover{
transform:translateY(-4px);
background:#1e88ff;
box-shadow:0 20px 45px rgba(0,0,0,.55);
}

/* COLORES REDES */

.youtube{border-left:5px solid #ff0000}
.instagram{border-left:5px solid #e1306c}
.facebook{border-left:5px solid #1877f2}
.x{border-left:5px solid #000}
.whatsapp{border-left:5px solid #25d366}

/* ===== FOOTER ===== */

footer{
margin-top:80px;
text-align:center;
color:#8fa3bf;
font-size:.85rem;
padding-bottom:25px;
}

/* ===== MOBILE ===== */

@media(max-width:480px){

.container h1{
font-size:1.9rem;
}

}

</style>
</head>

<body>

<section class="container">

<h1>Redes Sociales Oficiales</h1>

<p>
Síguenos y conoce más sobre nuestros proyectos, soluciones industriales y experiencia en lubricación.
</p>

<div class="social-box">

<a class="btn-social youtube" href="https://www.youtube.com/user/IDILSA" target="_blank">
YouTube
</a>

<a class="btn-social instagram" href="https://www.instagram.com/idilsa1998/" target="_blank">
Instagram
</a>

<a class="btn-social facebook" href="https://es-la.facebook.com/idilsa.ingenieriadisenolubricacion" target="_blank">
Facebook
</a>

<a class="btn-social x" href="https://x.com/idilsa" target="_blank">
X
</a>

<a class="btn-social whatsapp" href="https://api.whatsapp.com/send?phone=525546106384" target="_blank">
WhatsApp
</a>

</div>

</section>

<footer>
© 2026 IDILSA — Ingeniería & Diseño en Lubricación
</footer>

</body>
</html>
